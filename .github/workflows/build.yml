name: Build Windows Executable

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --name MapleBot src/main.py
        
    - name: Copy config.json to dist
      run: |
        copy src\config.json dist\config.json
        
    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MapleBot-Windows
        path: dist/
        
    - name: Commit and Push to build folder
      shell: bash
      run: |
        mkdir -p build
        cp dist/MapleBot.exe build/MapleBot.exe
        cp src/config.json build/config.json
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add build/
        git commit -m "Auto-build Windows executable [skip ci]" || echo "No changes to commit"
        git push
